<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open AcueLERT</title>

    <!-- Change these later when you have store links -->
    <script>
      // ✅ Customize these later
      const IOS_STORE_URL = "https://acuelert.app"; // replace with App Store URL later
      const ANDROID_STORE_URL = "https://acuelert.app"; // replace with Play Store URL later

      // Your app’s deep link / universal link target
      // You can include a path/query and the app should open it if installed
      const targetPath = window.location.search || ""; // keeps query string
      const universalLink = `https://acuelert.app/${targetPath ? "?" + targetPath.replace("?", "") : ""}`;

      function isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      }
      function isAndroid() {
        return /Android/.test(navigator.userAgent);
      }

      // Try to open via universal link first
      // If it doesn't open, fallback to store (or your placeholder)
      window.onload = () => {
        const start = Date.now();

        // Attempt open
        window.location.href = universalLink;

        // Fallback after a short delay (typical pattern)
        setTimeout(() => {
          // If user is still on this page after ~1.5s, assume app didn't open
          if (Date.now() - start < 2000) {
            if (isIOS()) window.location.href = IOS_STORE_URL;
            else if (isAndroid()) window.location.href = ANDROID_STORE_URL;
            else window.location.href = "https://acuelert.app/";
          }
        }, 1500);
      };
    </script>
  </head>

  <body style="background:black;color:white;font-family:sans-serif;text-align:center;padding-top:80px">
    <h1>Opening AcueLERT…</h1>
    <p>If nothing happens, you’ll be redirected.</p>
  </body>
</html>
