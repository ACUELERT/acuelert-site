<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>AcueLERT</title>

<script>
function openApp() {

  const params = new URLSearchParams(window.location.search);

  const tournament = params.get("tournament");
  const series = params.get("series");

  let deepLink = "acuelert://";

  if (tournament) {
    deepLink = "acuelert://t/" + tournament;
  }

  if (series) {
    deepLink = "acuelert://s/" + series;
  }

  // Attempt to open the app
  window.location = deepLink;

  // If app not installed → redirect to store
  setTimeout(function() {

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(ua)) {
      window.location = "https://play.google.com/store/apps/details?id=com.acuelert.app";
    } else {
      window.location = "https://apps.apple.com/app/idYOUR_APP_ID";
    }

  }, 1500);
}

window.onload = openApp;
</script>

<style>
body{
  background:#000;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-top:120px;
}
a{
  color:#4ea3ff;
}
</style>

</head>

<body>

<h1>AcueLERT</h1>

<p>Opening the app...</p>

<p>If nothing happens:</p>

<p>
<a href="https://apps.apple.com">Download on App Store</a>
</p>

<p>
<a href="https://play.google.com">Download on Google Play</a>
</p>

</body>
</html>
